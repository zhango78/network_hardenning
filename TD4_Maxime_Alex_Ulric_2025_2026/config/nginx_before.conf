# Configuration Baseline (BEFORE hardening) — TD4 Network Hardening
# Etat initial : TLS faible, pas de HSTS, pas de contrôles de bord

server {
    listen 443 ssl;
    server_name _;

    # Certificats
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Protocoles faibles activés (WEAKNESS)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

    # Ciphers faibles autorisés (WEAKNESS)
    ssl_ciphers HIGH:MEDIUM:!aNULL:!MD5;

    # Pas de préférence serveur (WEAKNESS)
    # ssl_prefer_server_ciphers off;

    # Pas de HSTS (WEAKNESS)

    # Pas de rate limiting (WEAKNESS)

    location / {
        root /var/www/html;
        index index.html;
    }
}

server {
    listen 80;
    server_name _;
    location / {
        root /var/www/html;
        index index.html;
    }
}
