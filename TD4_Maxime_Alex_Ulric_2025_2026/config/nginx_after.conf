# Configuration Durcie (AFTER hardening) — TD4 Network Hardening
# Référence : NIST SP 800-52r2

# Rate limiting — Control 1 (disponibilité)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s;

server {
    listen 443 ssl;
    server_name _;

    # Certificats NIST-compliant
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Profil TLS (NIST SP 800-52r2 §3.1)
    # TLS 1.0 et 1.1 désactivés
    ssl_protocols TLSv1.2 TLSv1.3;

    # Suites AEAD uniquement (NIST SP 800-52r2 §3.3)
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!RC4;

    # Préférence serveur activée
    ssl_prefer_server_ciphers on;

    # HSTS (NIST SP 800-52r2 §3.5)
    add_header Strict-Transport-Security "max-age=300" always;

    # Request Filtering — Control 2 (WAF concept)
    # Blocage des User-Agents identifiés comme outils de scan/scripting
    if ($http_user_agent ~* "curl|sqlmap|nikto|masscan|nmap") {
        return 403;
    }

    location / {
        # Rate limiting — burst de 5 requêtes toléré
        limit_req zone=api_limit burst=5 nodelay;
        root /var/www/html;
        index index.html;
    }
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
